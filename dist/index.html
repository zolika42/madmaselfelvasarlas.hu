<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MADMASEL Autófelvásárlás</title>
    <meta http-equiv="refresh" content="0; url=/hu/" />
    <script>
      (function () {
        var lang = (navigator.language || navigator.userLanguage || 'hu').toLowerCase();
        var target = '/hu/';
        if (lang.startsWith('de')) target = '/de/';
        else if (lang.startsWith('en')) target = '/en/';
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
